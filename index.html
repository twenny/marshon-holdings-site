<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Marshon Holdings, LLC</title>
<meta name="description" content="Marshon Holdings, LLC — a private family holding and investment company.">
<style>
  :root {
    --ground: #0b0f16;
    --panel: #10161f;
    --ink: #eef3f7;
    --ink-soft: #9fb0c0;
    --azure: #1b9bd1;
    --teal: #22c4c4;
    --navy: #0e3a5e;
    --line: rgba(255,255,255,0.08);
    --field: #0c1219;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --ground: #f7f8fa;
      --panel: #ffffff;
      --ink: #0e2033;
      --ink-soft: #566677;
      --azure: #1580b3;
      --teal: #159a9a;
      --navy: #0e3a5e;
      --line: rgba(14,58,94,0.12);
      --field: #f2f5f8;
    }
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--ground);
    color: var(--ink);
    font: 16px/1.6 system-ui, -apple-system, "Segoe UI", sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }
  .wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 48px 24px;
    max-width: 560px;
    margin: 0 auto;
    width: 100%;
  }
  .logo {
    width: 132px;
    height: 132px;
    margin-bottom: 28px;
    filter: drop-shadow(0 8px 24px rgba(27,155,209,0.25));
  }
  h1 {
    margin: 0;
    font-size: 26px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink);
  }
  .rule {
    width: 44px;
    height: 3px;
    margin: 20px 0;
    background: linear-gradient(90deg, var(--teal), var(--azure));
    border-radius: 2px;
  }
  .tagline {
    margin: 0 0 40px;
    font-size: 17px;
    color: var(--ink-soft);
    max-width: 30ch;
  }
  .contact {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 26px 24px;
    text-align: left;
  }
  .contact h2 {
    margin: 0 0 4px;
    font-size: 13px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--azure);
    font-weight: 600;
  }
  .contact p.sub {
    margin: 0 0 18px;
    font-size: 14px;
    color: var(--ink-soft);
  }
  label {
    display: block;
    font-size: 12px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin: 0 0 6px;
  }
  .field { margin-bottom: 14px; }
  input, textarea {
    width: 100%;
    background: var(--field);
    border: 1px solid var(--line);
    border-radius: 9px;
    color: var(--ink);
    font: inherit;
    padding: 11px 13px;
    transition: border-color .15s ease;
  }
  textarea { min-height: 108px; resize: vertical; }
  input:focus, textarea:focus {
    outline: none;
    border-color: var(--azure);
    box-shadow: 0 0 0 3px rgba(27,155,209,0.18);
  }
  button {
    width: 100%;
    margin-top: 4px;
    background: var(--azure);
    color: #fff;
    border: 0;
    border-radius: 9px;
    padding: 13px;
    font: 600 15px system-ui, sans-serif;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: filter .15s ease;
  }
  button:hover { filter: brightness(1.08); }
  button:focus-visible { outline: 2px solid var(--teal); outline-offset: 2px; }
  button[disabled] { opacity: .6; cursor: default; }
  .status {
    margin-top: 14px;
    font-size: 14px;
    text-align: center;
    min-height: 20px;
  }
  .status.ok { color: var(--teal); }
  .status.err { color: #e8736b; }
  footer {
    text-align: center;
    padding: 24px;
    font-size: 13px;
    color: var(--ink-soft);
    border-top: 1px solid var(--line);
  }
  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>
</head>
<body>
  <main class="wrap">
    <img class="logo" src="assets/logo.png" alt="Marshon Holdings logo">
    <h1>Marshon Holdings</h1>
    <div class="rule" aria-hidden="true"></div>
    <p class="tagline">A private family holding and investment company.</p>

    <section class="contact" aria-labelledby="contact-h">
      <h2 id="contact-h">Contact</h2>
      <p class="sub">For inquiries, send a message and we'll respond by email.</p>
      <form id="contact-form">
        <!-- Web3Forms: paste the free access key from web3forms.com below.
             Your destination email is registered with Web3Forms and never appears on this page. -->
        <input type="hidden" name="access_key" value="WEB3FORMS_ACCESS_KEY_HERE">
        <input type="hidden" name="subject" value="New inquiry — marshon.holdings">
        <input type="checkbox" name="botcheck" style="display:none" tabindex="-1" autocomplete="off">
        <div class="field">
          <label for="name">Name</label>
          <input id="name" type="text" name="name" required autocomplete="name">
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" name="email" required autocomplete="email">
        </div>
        <div class="field">
          <label for="message">Message</label>
          <textarea id="message" name="message" required></textarea>
        </div>
        <button type="submit" id="submit-btn">Send message</button>
        <div class="status" id="status" role="status" aria-live="polite"></div>
      </form>
    </section>
  </main>

  <footer>© 2026 Marshon Holdings, LLC.</footer>

  <script>
    (function () {
      "use strict";
      var form = document.getElementById("contact-form");
      var btn = document.getElementById("submit-btn");
      var status = document.getElementById("status");
      form.addEventListener("submit", function (e) {
        e.preventDefault();
        status.className = "status";
        status.textContent = "";
        var key = form.access_key.value;
        if (!key || key === "WEB3FORMS_ACCESS_KEY_HERE") {
          status.className = "status err";
          status.textContent = "Contact form not yet configured.";
          return;
        }
        btn.disabled = true;
        btn.textContent = "Sending…";
        fetch("https://api.web3forms.com/submit", {
          method: "POST",
          headers: { "Content-Type": "application/json", "Accept": "application/json" },
          body: JSON.stringify(Object.fromEntries(new FormData(form)))
        }).then(function (r) { return r.json(); }).then(function (data) {
          if (data.success) {
            status.className = "status ok";
            status.textContent = "Thanks — your message has been sent.";
            form.reset();
          } else {
            status.className = "status err";
            status.textContent = "Something went wrong. Please try again.";
          }
        }).catch(function () {
          status.className = "status err";
          status.textContent = "Network error. Please try again.";
        }).finally(function () {
          btn.disabled = false;
          btn.textContent = "Send message";
        });
      });
    })();
  </script>
</body>
</html>
